[build]
  publish = "dist"
  command = "yarn build"

  [build.environment]
    NODE_VERSION = "22"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
    X-Robots-Tag = "noindex"

# Force payment callback to SSR function — bypasses Netlify CDN cross-site POST block
[[redirects]]
  from = "/api/payment-callback"
  to = "/.netlify/functions/ssr"
  status = 200
  force = true

[[redirects]]
  from = "/api/payment-callback/"
  to = "/.netlify/functions/ssr"
  status = 200
  force = true